name: Benchmark Loop

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run benchmark
        run: |
          python scripts/run_benchmark.py --map tests/fixtures/warehouse.json --k 5 --objective capture_prob --mc-runs 120 --time-horizon-steps 40 --seed 7
          bash scripts/publish_site.sh
      - name: Commit benchmark data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runs site/data
          if git diff --cached --quiet; then
            echo "No benchmark changes"
          else
            git commit -m "chore: automated benchmark update"
            git push
          fi
